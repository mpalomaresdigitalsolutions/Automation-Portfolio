<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mpalomares Portal — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.12/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg: #060810;
      --bg2: #0b0e1a;
      --accent: #00d4ff;
      --accent2: #7b2fff;
      --accent3: #ff6b35;
      --green: #00ff88;
      --text: #e8eeff;
      --muted: #6b7299;
      --border: rgba(255,255,255,0.07);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(0,212,255,0.06) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 50%, rgba(123,47,255,0.06) 0%, transparent 60%);
    }
    .login-container {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(0,212,255,0.06);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .logo h1 span { color: var(--accent); }
    .logo img { max-height: 40px; margin-bottom: 8px; }
    .logo p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      font-family: 'Outfit', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.12);
    }
    .form-group input::placeholder { color: var(--muted); opacity: 0.5; }
    .login-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 4px;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-btn:active { transform: scale(0.98); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider-text {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .google-btn {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .google-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
    }
    .google-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .google-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .error-msg {
      background: rgba(255,107,53,0.12);
      border: 1px solid rgba(255,107,53,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--accent3);
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.visible { display: block; }
    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div id="loginLogo"><h1><span>◈</span> Mpalomares</h1></div>
      <p>Client Portal</p>
    </div>
    <div id="errorMsg" class="error-msg"></div>

    <!-- Email/Password Login -->
    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or continue with</span>
      <div class="divider-line"></div>
    </div>

    <!-- Google Sign-In -->
    <div style="text-align:right;margin-bottom:10px;">
      <button id="themeToggleLogin" style="background:none;border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;">🌙 Dark</button>
    </div>
    <button class="google-btn" id="googleBtn"
      <svg viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </button>

    <div class="footer-text">Secure login via Supabase Auth</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dkkriesneublbmrihgvp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRra3JpZXNuZXVibGJtcmloZ3ZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3Mzk2NjIsImV4cCI6MjA5ODMxNTY2Mn0.xBzuqJ4kCLWMxvT6CRNIpSMDVcBQvq42Xeg0OnHfPCY';
    var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        autoRefreshToken: true,
        persistSession: true
      }
    });

    // Load company logo from settings
    (function loadLoginLogo() {
      var logoEl = document.getElementById('loginLogo');
      supabase.from('settings').select('data').eq('id', 1).maybeSingle().then(function(r) {
        if (!r.error && r.data && r.data.data && r.data.data.logo_url) {
          logoEl.innerHTML = '<img src="' + r.data.data.logo_url + '" alt="Company Logo">';
        }
      }).catch(function(error) { console.warn('Unable to load login branding:', error.message); });
    })();

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const googleBtn = document.getElementById('googleBtn');
    const errorMsg = document.getElementById('errorMsg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function hideError() {
      errorMsg.textContent = '';
      errorMsg.classList.remove('visible');
    }

    function setLoading(loading) {
      loginBtn.disabled = loading;
      loginBtn.innerHTML = loading
        ? '<span class="spinner"></span> Signing in…'
        : 'Sign In';
    }

    // Email/Password sign-in
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      setLoading(true);

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        setLoading(false);
        return;
      }

      try {
        const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (authError) {
          showError(authError.message || 'Invalid credentials. Please try again.');
          setLoading(false);
          return;
        }

        if (!authData || !authData.user) {
          showError('Authentication failed. Please try again.');
          setLoading(false);
          return;
        }

        await handlePostLogin(email);
      } catch (err) {
        console.error('Login error:', err);
        showError('An unexpected error occurred. Please try again.');
        setLoading(false);
      }
    });

    // Google Sign-In
    googleBtn.addEventListener('click', async () => {
      hideError();
      googleBtn.disabled = true;
      googleBtn.innerHTML = '<span class="spinner"></span> Signing in…';

      try {
        const { data, error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: window.location.origin + '/login.html'
          }
        });

        if (error) {
          showError(error.message || 'Google sign-in failed.');
          googleBtn.disabled = false;
          googleBtn.innerHTML = `...`; // will reset below
          resetGoogleBtn();
        }
        // If no error, browser redirects to Google — nothing more to do
      } catch (err) {
        console.error('Google sign-in error:', err);
        showError('Google sign-in failed. Please try again.');
        resetGoogleBtn();
      }
    });

    function resetGoogleBtn() {
      googleBtn.disabled = false;
      googleBtn.innerHTML = `<svg viewBox="0 0 48 48" style="width:20px;height:20px">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg> Sign in with Google`;
    }

    // Handle post-login redirect (same for email and Google)
    async function handlePostLogin(email) {
      const { data: portalUser, error: portalError } = await supabase
        .from('portal_users')
        .select('id, role, client_id, display_name')
        .eq('email', email)
        .single();

      if (portalError || !portalUser) {
        showError('Account not found in portal. Please contact an administrator.');
        return;
      }

      const role = portalUser.role;
      sessionStorage.setItem('portal_user_id', portalUser.id);
      sessionStorage.setItem('portal_email', email);
      sessionStorage.setItem('portal_role', role);
      sessionStorage.setItem('portal_display_name', portalUser.display_name || '');

      if (role === 'admin') {
        window.location.href = 'admin.html';
      } else if (role === 'client') {
        sessionStorage.setItem('client_id', portalUser.client_id || '');
        window.location.href = 'client-view.html';
      } else {
        showError('Unknown user role. Please contact an administrator.');
      }
    }

    // Handle OAuth redirect (Google callback)
    (async function handleHashFragment() {
      try {
        // Supabase stores session in the URL hash fragment after OAuth redirect
        const hash = window.location.hash;
        if (hash && hash.includes('access_token')) {
          // Session is auto-parsed by supabase-js — retrieve it
          const { data: { session }, error } = await supabase.auth.getSession();
          if (error) {
            console.error('Session retrieval error:', error);
            return;
          }
          if (session && session.user) {
            const email = session.user.email;
            // Clean hash from URL
            history.replaceState(null, '', window.location.pathname);
            await handlePostLogin(email);
          }
        } else {
          // Check if already logged in (normal session check)
          const { data: { session } } = await supabase.auth.getSession();
          if (session) {
            const email = session.user.email;
            const { data: portalUser } = await supabase
              .from('portal_users')
              .select('role, client_id, display_name')
              .eq('email', email)
              .single();
            if (portalUser) {
              sessionStorage.setItem('portal_user_id', portalUser.id);
              sessionStorage.setItem('portal_email', email);
              sessionStorage.setItem('portal_role', portalUser.role);
              sessionStorage.setItem('portal_display_name', portalUser.display_name || '');
              if (portalUser.role === 'admin') {
                window.location.href = 'admin.html';
              } else if (portalUser.role === 'client') {
                sessionStorage.setItem('client_id', portalUser.client_id || '');
                window.location.href = 'client-view.html';
              }
            }
          }
        }
      } catch (e) { /* silent */ }
    })();
  </script>
  <script>
    var savedLoginTheme = localStorage.getItem('login-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedLoginTheme);
    document.getElementById('themeToggleLogin').addEventListener('click', function() {
      var current = document.documentElement.getAttribute('data-theme') || 'dark';
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('login-theme', next);
      this.textContent = next === 'dark' ? '🌙 Dark' : '☀️ Light';
    });
  </script>
</body>
</html>
